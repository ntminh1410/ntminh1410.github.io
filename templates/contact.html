<header class="page-header">
  <span class="page-header__icon" aria-hidden="true">💬</span>
  <h1 class="page-header__title">Contact</h1>
  {{#if contact.intro}}
    <p class="page-header__desc">{{contact.intro}}</p>
  {{else}}
    <p class="page-header__desc">Get in touch — I'd love to hear from you.</p>
  {{/if}}
</header>

<section class="contact-methods">
  {{#if contact.email}}
    <a class="contact-method" href="mailto:{{contact.email}}">
      <span class="contact-method__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
      </span>
      <span class="contact-method__label">Email</span>
      <span class="contact-method__value">{{contact.email}}</span>
      <span class="ext-arrow" aria-hidden="true">↗</span>
    </a>
  {{/if}}

  {{{contact_socials_html}}}
</section>

{{#if contact.form_endpoint}}
<section class="contact-form-section">
  <h2 class="contact-form-section__title">Or send a message</h2>
  <form class="contact-form" method="post" action="{{contact.form_endpoint}}">
    <div class="contact-form__row">
      <label class="contact-form__label">
        <span>Your name</span>
        <input type="text" name="name" required autocomplete="name">
      </label>
      <label class="contact-form__label">
        <span>Your email</span>
        <input type="email" name="email" required autocomplete="email">
      </label>
    </div>
    <label class="contact-form__label">
      <span>Message</span>
      <textarea name="message" rows="5" required></textarea>
    </label>
    <button class="btn btn--accent contact-form__submit" type="submit">Send message</button>
  </form>
</section>
{{/if}}
