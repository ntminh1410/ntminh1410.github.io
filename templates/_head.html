<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>{{page_title}}</title>
<meta name="description" content="{{page_description}}">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0e11" media="(prefers-color-scheme: dark)">

<meta property="og:type" content="website">
<meta property="og:title" content="{{page_title}}">
<meta property="og:description" content="{{page_description}}">
{{#if site.url}}<meta property="og:url" content="{{site.url}}{{page_path}}">{{/if}}
{{#if site.meta_og_image}}<meta property="og:image" content="{{site.meta_og_image}}">{{/if}}
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28'%3E💬%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap">

<link rel="stylesheet" href="/static/css/styles.css">

<style>
  :root {
    --accent: {{site.accent_color}};
  }
</style>

<script>
  // Apply saved theme before paint to prevent flash.
  (function() {
    var saved = null;
    try { saved = localStorage.getItem('theme'); } catch (e) {}
    var defaultScheme = '{{site.color_scheme_default}}';
    var theme = saved || defaultScheme || 'system';
    if (theme === 'system') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
  })();
</script>
