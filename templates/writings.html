<header class="page-header">
  <span class="page-header__icon" aria-hidden="true">🌵</span>
  <h1 class="page-header__title">Writings</h1>
  <p class="page-header__desc">Notes on design, tools, and process — short and often.</p>
</header>

{{#if tags.length}}
<nav class="tag-row" aria-label="Filter writings by tag">
  <a href="/writings/" class="tag-row__item{{#if is_all}} tag-row__item--active{{/if}}">All</a>
  {{#each tags}}
    {{#if visible_in_filter}}
      <a href="/writings/tag/{{slug}}/" class="tag-row__item{{#if @active}} tag-row__item--active{{/if}}" style="--tag-color: {{color}};">{{name}}</a>
    {{/if}}
  {{/each}}
</nav>
{{/if}}

{{{writings_html}}}

{{#unless writings.length}}
  <p class="empty-state">No writings yet. Check back soon.</p>
{{/unless}}

{{> _newsletter}}
