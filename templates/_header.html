<header class="site-header">
  <div class="site-header__inner">
    <nav class="site-nav" aria-label="Primary">
      {{#each nav.primary}}
        <a href="{{url}}" class="site-nav__link"{{#if external}} target="_blank" rel="noopener"{{/if}}>{{label}}</a>
      {{/each}}
    </nav>

    <div class="site-header__actions">
      <button class="icon-btn theme-toggle" type="button" aria-label="Toggle theme" data-theme-toggle>
        <svg class="icon icon--sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
        <svg class="icon icon--moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
  </div>
</header>
